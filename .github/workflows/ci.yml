name: CI

on:
  push:
    branches: ["main", "dev", "release"]
  pull_request:
    branches: ["main", "dev", "release"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Format Check (Prettier)
        run: npm run format:check

      - name: Type Check & Build
        run: npm run build
